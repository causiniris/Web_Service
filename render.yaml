services:
  - type: web
    name: smart-knee-web
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        value: ""
      - key: VITE_TELEMETRY_PATH
        value: /api/telemetry
